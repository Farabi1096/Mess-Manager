<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar and animations from your code */
        .custom-scrollbar::-webkit-scrollbar { width: 0px; background: transparent; }
        :root { --ease-ios: cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes pageEnter { from { opacity: 0; transform: scale(0.99) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes staggerIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
        .animate-page-enter { animation: pageEnter 0.4s var(--ease-ios) forwards; }
        .animate-slide-up-fade { animation: slideUpFade 0.5s var(--ease-ios) backwards; }
        .animate-stagger-in { animation: staggerIn 0.3s var(--ease-ios) forwards; }
        .animate-scale-in { animation: scaleIn 0.4s var(--ease-ios) backwards; }
        .animate-bounce-in { animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white h-screen overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { createRoot } from 'react-dom/client';
        
        // --- YOUR CODE STARTS HERE ---
import React, { useState } from 'react';
import { 
  Home, 
  CalendarDays, 
  Wallet, 
  User, 
  Plus, 
  Coffee, 
  Utensils, 
  Moon, 
  TrendingUp, 
  ShoppingBag,
  ChevronRight,
  ChevronLeft,
  ChevronDown,
  Bell,
  X,
  ShoppingCart,
  CheckCircle2,
  Calendar,
  Banknote,
  Edit3,
  UserPlus,
  LogOut,
  Camera
} from 'lucide-react';

export default function App() {
  // --- AUTHENTICATION STATE ---
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [loginError, setLoginError] = useState('');

  const [activeTab, setActiveTab] = useState('home');
  const [isFabOpen, setIsFabOpen] = useState(false);
  const [isNotificationOpen, setIsNotificationOpen] = useState(false);
  const [modalType, setModalType] = useState(null);
  const [editingMember, setEditingMember] = useState(null);
  const [editingExpense, setEditingExpense] = useState(null);
  const [isSnapping, setIsSnapping] = useState(false);
  
  // 1. Core Source of Truth for Expenses
  const [expenses, setExpenses] = useState([
    { id: 1, name: 'Rice & Oil', amount: 1250, date: 'Mar 04', rawDate: '2026-03-04', memberName: 'Rakib Hasan', memberId: 1 },
    { id: 2, name: 'Vegetables & Fish', amount: 840, date: 'Mar 03', rawDate: '2026-03-03', memberName: 'Sajid Ahmed', memberId: 2 },
    { id: 3, name: 'Chicken & Spices', amount: 1500, date: 'Mar 01', rawDate: '2026-03-01', memberName: 'Tarikul Islam', memberId: 3 },
    { id: 4, name: 'Monthly Groceries', amount: 5740, date: 'Feb 28', rawDate: '2026-02-28', memberName: 'Rakib Hasan', memberId: 1 },
  ]);

  // 2. Core Source of Truth for Cash Deposits
  const [deposits, setDeposits] = useState([
    { id: 1, memberId: 2, amount: 660, date: 'Mar 01', rawDate: '2026-03-01' }, 
    { id: 2, memberId: 3, amount: 700, date: 'Mar 01', rawDate: '2026-03-01' }, 
  ]);

  // 3. Member Info (Balances are now calculated dynamically below)
  const [memberFinances, setMemberFinances] = useState([
    { id: 1, name: 'Rakib Hasan', totalMeals: 47.5, manualCreditAdjustment: 0 }, 
    { id: 2, name: 'Sajid Ahmed', totalMeals: 41.5, manualCreditAdjustment: 0 }, 
    { id: 3, name: 'Tarikul Islam', totalMeals: 37.5, manualCreditAdjustment: 0 }, 
    { id: 4, name: 'Mehedi Hasan', totalMeals: 33, manualCreditAdjustment: 0 },   
  ]);

  const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const [memberSchedules, setMemberSchedules] = useState(() => {
    return memberFinances.map(m => ({
      memberId: m.id,
      schedule: daysOfWeek.reduce((acc, day) => {
        acc[day] = { breakfast: 1, lunch: 1, dinner: 1 };
        return acc;
      }, {})
    }));
  });
  const [selectedScheduleMember, setSelectedScheduleMember] = useState(1);

  const [holidays, setHolidays] = useState([
    { id: 1, date: '2026-03-26', name: 'Independence Day' }
  ]);

  const [mealExceptions, setMealExceptions] = useState([]);
  
  const [bazarSchedules, setBazarSchedules] = useState([
    { id: 1, memberId: 1, startDate: '2026-03-01', endDate: '2026-03-05' },
    { id: 2, memberId: 2, startDate: '2026-03-06', endDate: '2026-03-10' }
  ]);

  const [selectedFinanceMonth, setSelectedFinanceMonth] = useState('2026-03');
  const [showAllExpenses, setShowAllExpenses] = useState(false);
  
  // --- DYNAMIC CALCULATIONS ENGINE ---
  const totalMessExpenses = expenses.reduce((sum, exp) => sum + exp.amount, 0);
  const totalMessMeals = memberFinances.reduce((sum, m) => sum + (m.totalMeals || 0), 0);
  const currentMealRate = totalMessMeals > 0 ? (totalMessExpenses / totalMessMeals) : 0;
  
  const getMemberCredit = (memberId) => {
    const expSum = expenses.filter(e => e.memberId === memberId).reduce((s, e) => s + e.amount, 0);
    const depSum = deposits.filter(d => d.memberId === memberId).reduce((s, d) => s + d.amount, 0);
    const member = memberFinances.find(m => m.id === memberId);
    const adjSum = member?.manualCreditAdjustment || 0;
    return expSum + depSum + adjSum;
  };

  const LOGGED_IN_USER_ID = 1; 
  const loggedInMember = memberFinances.find(m => m.id === LOGGED_IN_USER_ID);
  const loggedInTotalCost = loggedInMember ? (loggedInMember.totalMeals * currentMealRate) : 0;
  
  const [selectedDateObj, setSelectedDateObj] = useState(new Date());

  const getFormattedDateStr = (dateObj) => {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const d = String(dateObj.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  };

  const selectedDateStr = getFormattedDateStr(selectedDateObj);
  const selectedDayName = daysOfWeek[selectedDateObj.getDay()];
  const isToday = selectedDateStr === getFormattedDateStr(new Date());

  // --- NOTIFICATION ENGINE ---
  const todayActualStr = getFormattedDateStr(new Date());
  const sortedBazarSchedules = [...bazarSchedules].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
  const currentBazar = sortedBazarSchedules.find(s => s.startDate <= todayActualStr && s.endDate >= todayActualStr);
  const nextBazar = sortedBazarSchedules.find(s => s.startDate > todayActualStr);

  let notificationTitle = "No Updates";
  let notificationMsg = "No bazar scheduled at the moment.";
  let hasActiveNotification = false;

  if (currentBazar) {
    const m = memberFinances.find(m => m.id === currentBazar.memberId);
    notificationTitle = "Active Bazar Duty";
    notificationMsg = `${m ? m.name : 'Someone'} is assigned for bazar until ${new Date(currentBazar.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}.`;
    hasActiveNotification = true;
  } else if (nextBazar) {
    const m = memberFinances.find(m => m.id === nextBazar.memberId);
    notificationTitle = "Upcoming Bazar";
    notificationMsg = `${m ? m.name : 'Someone'} is scheduled starting ${new Date(nextBazar.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}.`;
    hasActiveNotification = true;
  }

  // Changed to empty object so it naturally relies on our new default strings
  const [dailyMenus, setDailyMenus] = useState({});

  const activeHoliday = holidays.find(h => h.date === selectedDateStr);
  const isSelectedHoliday = !!activeHoliday;
  
  // Dynamically calculate total meals for the entire mess for the selected date
  let totalBreakfast = 0;
  let totalLunch = 0;
  let totalDinner = 0;

  if (!isSelectedHoliday) {
    memberFinances.forEach(member => {
      const schedule = memberSchedules.find(s => s.memberId === member.id)?.schedule[selectedDayName] || { breakfast: 0, lunch: 0, dinner: 0 };
      const exception = mealExceptions.find(e => e.memberId === member.id && e.date === selectedDateStr);

      totalBreakfast += exception?.breakfast !== undefined ? exception.breakfast : schedule.breakfast;
      totalLunch += exception?.lunch !== undefined ? exception.lunch : schedule.lunch;
      totalDinner += exception?.dinner !== undefined ? exception.dinner : schedule.dinner;
    });
  }

  const changeDate = (days) => {
    const newDate = new Date(selectedDateObj);
    newDate.setDate(newDate.getDate() + days);
    setSelectedDateObj(newDate);
  };

  // --- LOGIN HANDLER ---
  const handleLoginSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const username = fd.get('username');
    const password = fd.get('password');

    if (username === 'admin' && password === '1234') {
      setIsLoggedIn(true);
      setLoginError('');
    } else {
      setLoginError('Invalid username or password. (Hint: admin / 1234)');
    }
  };

  // --- SNAP & SHARE HANDLERS ---
  const triggerDownload = (dataUrl) => {
    const link = document.createElement('a');
    link.download = `mess-finance-${selectedFinanceMonth}.png`;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const handleSnap = async () => {
    setIsSnapping(true);
    try {
      if (!window.html2canvas) {
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      const element = document.getElementById('finance-summary-container');
      if (!element) return;

      const canvas = await window.html2canvas(element, {
        scale: 3, // High resolution for sharing
        backgroundColor: '#FAFAFA',
        logging: false,
      });

      canvas.toBlob(async (blob) => {
        if (!blob) {
          setIsSnapping(false);
          return;
        }
        const file = new File([blob], `mess-finance-${selectedFinanceMonth}.png`, { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              title: 'Mess Finance Summary',
              text: `Here is the Mess Finance Summary for ${selectedFinanceMonth}.`,
              files: [file],
            });
          } catch (shareError) {
            console.log('Share failed/canceled:', shareError);
            if (shareError.name !== 'AbortError') {
               triggerDownload(canvas.toDataURL('image/png'));
            }
          }
        } else {
          // Fallback if browser doesn't support file sharing
          triggerDownload(canvas.toDataURL('image/png'));
        }
        setIsSnapping(false);
      }, 'image/png');
    } catch (error) {
      console.error('Error snapping:', error);
      setIsSnapping(false);
    }
  };

  // --- SUBMIT HANDLERS ---
  const handleBazarScheduleSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const newSchedule = {
      id: Date.now(),
      memberId: parseInt(fd.get('memberId')),
      startDate: fd.get('startDate'),
      endDate: fd.get('endDate')
    };
    
    setBazarSchedules(prev => [...prev, newSchedule].sort((a, b) => new Date(a.startDate) - new Date(b.startDate)));
    setModalType(null);
  };

  const handleDeleteBazarSchedule = (scheduleId) => {
    setBazarSchedules(prev => prev.filter(s => s.id !== scheduleId));
  };

  const handleMenuSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const b = fd.get('menuBreakfast')?.trim();
    const l = fd.get('menuLunch')?.trim();
    const d = fd.get('menuDinner')?.trim();

    setDailyMenus(prev => ({
      ...prev,
      [fd.get('menuDate')]: {
        breakfast: b || "Alur Bhorta & Dal",
        lunch: l || "Murgir Kala Buna",
        dinner: d || "Lal Shak, Lau Baji, Dal"
      }
    }));
    setModalType(null);
  };

  const handleBazarSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const memberId = parseInt(fd.get('memberId'));
    const amount = parseFloat(fd.get('amount'));
    const rawDate = fd.get('bazarDate');
    
    const dateObj = new Date(rawDate);
    const member = memberFinances.find(m => m.id === memberId);

    setExpenses([{
      id: Date.now(),
      name: fd.get('itemName'),
      amount: amount,
      date: dateObj.toLocaleDateString('en-US', { month: 'short', day: '2-digit' }),
      rawDate: rawDate,
      memberName: member ? member.name : 'Unknown',
      memberId: memberId
    }, ...expenses]);

    setModalType(null);
  };

  const handleEditBazarSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const newMemberId = parseInt(fd.get('memberId'));
    const newAmount = parseFloat(fd.get('amount'));
    const newName = fd.get('itemName');
    const newRawDate = fd.get('bazarDate');
    
    const dateObj = new Date(newRawDate);
    const newMember = memberFinances.find(m => m.id === newMemberId);

    setExpenses(prev => prev.map(exp => 
      exp.id === editingExpense.id ? {
        ...exp,
        name: newName,
        amount: newAmount,
        date: dateObj.toLocaleDateString('en-US', { month: 'short', day: '2-digit' }),
        rawDate: newRawDate,
        memberName: newMember ? newMember.name : 'Unknown',
        memberId: newMemberId
      } : exp
    ));
    
    setModalType(null);
    setEditingExpense(null);
  };

  const handleDeleteBazar = (expenseId) => {
    setExpenses(prev => prev.filter(e => e.id !== expenseId));
    setModalType(null);
    setEditingExpense(null);
  };

  const handleDepositSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const memberId = parseInt(fd.get('memberId'));
    const amount = parseFloat(fd.get('amount'));

    setDeposits([{
      id: Date.now(),
      memberId,
      amount,
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: '2-digit' }),
      rawDate: getFormattedDateStr(new Date())
    }, ...deposits]);

    setModalType(null);
  };

  const handleMealSubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const memberId = parseInt(fd.get('memberId'));
    const mealCount = parseFloat(fd.get('mealCount'));

    setMemberFinances(prev => prev.map(m => 
      m.id === memberId ? { ...m, totalMeals: (m.totalMeals || 0) + mealCount } : m
    ));
    setModalType(null);
  };

  const handleAddMember = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const newId = Date.now();
    
    setMemberFinances(prev => [...prev, {
      id: newId, 
      name: fd.get('name'), 
      totalMeals: 0,
      manualCreditAdjustment: 0
    }]);
    
    setMemberSchedules(prev => [...prev, {
      memberId: newId,
      schedule: daysOfWeek.reduce((acc, day) => {
        acc[day] = { breakfast: 1, lunch: 1, dinner: 1 };
        return acc;
      }, {})
    }]);
    setModalType(null);
  };

  const handleEditMember = (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const id = editingMember.id;

    const targetCredit = parseFloat(fd.get('bazarAmount')) || 0;
    const currentDerived = getMemberCredit(id) - (editingMember.manualCreditAdjustment || 0);
    const newAdjustment = targetCredit - currentDerived;

    setMemberFinances(prev => prev.map(m => {
      if (m.id === id) {
        return {
          ...m,
          name: fd.get('name'),
          totalMeals: parseFloat(fd.get('totalMeals')) || 0,
          manualCreditAdjustment: newAdjustment
        };
      }
      return m;
    }));
    setModalType(null);
    setEditingMember(null);
  };

  const handleDeleteMember = (memberId) => {
    setMemberFinances(prev => prev.filter(m => m.id !== memberId));
    setMemberSchedules(prev => prev.filter(s => s.memberId !== memberId));
    setMealExceptions(prev => prev.filter(e => e.memberId !== memberId));
    setBazarSchedules(prev => prev.filter(b => b.memberId !== memberId));
    setModalType(null);
    setEditingMember(null);
  };

  const handleOffDaySubmit = (e) => { 
    e.preventDefault();
    const fd = new FormData(e.target);
    const memberId = parseInt(fd.get('memberId'));
    const date = fd.get('offDate');
    const mealType = fd.get('mealType'); 
    
    setMealExceptions(prev => {
      const existingIdx = prev.findIndex(e => e.memberId === memberId && e.date === date);
      const updates = mealType === 'all' ? { breakfast: 0, lunch: 0, dinner: 0 } : { [mealType]: 0 };
      
      let newList = [...prev];
      if (existingIdx >= 0) {
         newList[existingIdx] = { ...newList[existingIdx], ...updates };
      } else {
         newList.push({ id: Date.now(), memberId, date, ...updates });
      }
      return newList.sort((a, b) => new Date(a.date) - new Date(b.date));
    });
    setModalType(null);
  };

  const handleHolidaySubmit = (e) => { 
    e.preventDefault();
    const fd = new FormData(e.target);
    const newHoliday = {
      id: Date.now(),
      date: fd.get('holidayDate'),
      name: fd.get('holidayName')
    };
    setHolidays(prev => [...prev, newHoliday].sort((a, b) => new Date(a.date) - new Date(b.date)));
    setModalType(null);
  };

  const handleToggleSettle = (memberId, isSettling) => {
    setMemberFinances(prev => prev.map(m => {
      if (m.id !== memberId) return m;
      const actualMealCost = m.totalMeals * currentMealRate;
      return {
        ...m,
        settlementAdjustment: isSettling ? (actualMealCost - getMemberCredit(memberId)) : 0
      };
    }));
  };

  // --- Components ---

  if (!isLoggedIn) {
    return (
      <div className="min-h-screen bg-[#FAFAFA] font-sans text-gray-800">
        <div className="mx-auto w-full h-[100dvh] md:h-[800px] md:max-w-[400px] md:my-4 bg-[#FAFAFA] md:rounded-[2.5rem] md:shadow-2xl relative overflow-hidden flex flex-col justify-center px-8 md:border md:border-gray-200 transition-all">
          
          <div className="absolute top-0 inset-x-0 h-64 pointer-events-none overflow-hidden z-0">
            <div className="absolute -top-10 -left-20 w-64 h-64 bg-[#0060E5]/10 rounded-full blur-[60px]"></div>
            <div className="absolute top-10 -right-16 w-56 h-56 bg-[#FC0075]/10 rounded-full blur-[50px]"></div>
          </div>

          <div className="relative z-10 flex flex-col items-center mb-10 text-center">
            <div className="w-16 h-16 bg-white rounded-full shadow-lg flex items-center justify-center mb-6">
              <Utensils size={32} className="text-[#0060E5]" strokeWidth={2.5} />
            </div>
            <h1 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#052065] to-[#0060E5] tracking-tight mb-2">
              Hungry Bachelors
            </h1>
            <p className="text-gray-500 text-xs font-bold uppercase tracking-widest">Mess Management App</p>
          </div>

          <form onSubmit={handleLoginSubmit} className="relative z-10 flex flex-col gap-5">
            <div>
              <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block px-1">Username</label>
              <input 
                type="text" 
                name="username" 
                defaultValue="admin" 
                required 
                className="w-full border border-white shadow-sm rounded-2xl p-4 text-sm font-bold text-[#052065] bg-white/80 backdrop-blur-md focus:outline-none focus:border-[#0060E5] transition-colors" 
              />
            </div>
            <div>
              <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block px-1">Password</label>
              <input 
                type="password" 
                name="password" 
                defaultValue="1234" 
                required 
                className="w-full border border-white shadow-sm rounded-2xl p-4 text-sm font-bold text-[#052065] bg-white/80 backdrop-blur-md focus:outline-none focus:border-[#0060E5] transition-colors" 
              />
            </div>
            
            {loginError && (
              <p className="text-[#F33131] text-[10px] font-bold uppercase tracking-wider text-center mt-2 bg-red-50 p-2 rounded-lg border border-red-100">
                {loginError}
              </p>
            )}

            <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-2xl py-4 mt-4 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">
              Sign In
            </button>
          </form>
        </div>
      </div>
    );
  }

  const renderHomeTab = () => {
    // Determine the current menu dynamically, falling back to the requested examples
    const currentMenu = dailyMenus[selectedDateStr] || {
      breakfast: "Ex: Alur Bhorta & Dal",
      lunch: "Ex: Murgir Kala Buna",
      dinner: "Ex: Lal Shak, Lau Baji, Dal"
    };

    // Dynamically calculate total meals for the ENTIRE mess for the selected date
    let totalBreakfast = 0;
    let totalLunch = 0;
    let totalDinner = 0;

    if (!isSelectedHoliday) {
      memberFinances.forEach(member => {
        const schedule = memberSchedules.find(s => s.memberId === member.id)?.schedule[selectedDayName] || { breakfast: 0, lunch: 0, dinner: 0 };
        const exception = mealExceptions.find(e => e.memberId === member.id && e.date === selectedDateStr);

        totalBreakfast += exception?.breakfast !== undefined ? exception.breakfast : schedule.breakfast;
        totalLunch += exception?.lunch !== undefined ? exception.lunch : schedule.lunch;
        totalDinner += exception?.dinner !== undefined ? exception.dinner : schedule.dinner;
      });
    }

    const displayedMeals = {
      breakfast: totalBreakfast,
      lunch: totalLunch,
      dinner: totalDinner,
    };

    return (
      <div className="flex flex-col gap-6 pb-[100px] pt-10 px-4 sm:px-6 relative z-10">
        <div className="flex justify-between items-center px-1">
          <div>
            <p className="text-[#0060E5] text-[10px] tracking-widest uppercase font-extrabold mb-0.5 flex items-center gap-1.5">
              <Utensils size={12} strokeWidth={3} /> Mess Manager
            </p>
            <h1 className="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-[#052065] to-[#0060E5] tracking-tight">
              Hungry Bachelors
            </h1>
          </div>
          
          {/* Notification Bell Container */}
          <div className="relative flex items-center">
            <button 
              onClick={() => setIsNotificationOpen(!isNotificationOpen)}
              className="relative p-2 text-[#052065] hover:bg-white/50 rounded-full transition shadow-sm backdrop-blur-sm bg-white/30 border border-white/50"
            >
              <Bell size={20} strokeWidth={1.5} />
              {hasActiveNotification && <span className="absolute top-1.5 right-2 w-2 h-2 bg-[#FC0075] rounded-full shadow-[0_0_8px_rgba(252,0,117,0.8)]"></span>}
            </button>

            {/* Notification Popover Bubble */}
            {isNotificationOpen && (
              <>
                <div 
                  className="fixed inset-0 z-40" 
                  onClick={() => setIsNotificationOpen(false)}
                ></div>
                <div className="absolute right-full mr-3 top-0 w-[220px] bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-gray-100 p-4 z-50 animate-in slide-in-from-right-2 fade-in duration-200">
                  {/* Speech bubble arrow pointing right */}
                  <div className="absolute top-4 -right-1.5 w-3 h-3 bg-white border-t border-r border-gray-100 rotate-45 transform origin-center"></div>
                  
                  <div className="relative z-10">
                    <h4 className="text-[10px] font-extrabold text-[#FC0075] uppercase tracking-widest mb-1.5">
                      {notificationTitle}
                    </h4>
                    <p className="text-xs font-bold text-[#052065] leading-snug">
                      {notificationMsg}
                    </p>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>

        <div className="flex gap-3 px-1">
          <div className="flex-1 bg-[#052065] p-5 rounded-2xl shadow-lg shadow-[#052065]/20 flex flex-col justify-between relative overflow-hidden min-h-[110px]">
            <div className="absolute top-0 right-0 w-24 h-24 bg-white/10 blur-2xl rounded-full"></div>
            <div className="relative z-10 flex items-center gap-2 mb-3 text-[#86DEF7]">
              <Wallet size={14} strokeWidth={2.5} />
              <p className="text-[10px] font-bold uppercase tracking-wider">Total Cost</p>
            </div>
            <h2 className="relative z-10 text-2xl font-bold text-white tracking-tight">৳ {loggedInTotalCost.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})}</h2>
          </div>
          <div className="flex-1 bg-white/80 backdrop-blur-md p-5 rounded-2xl border border-white/60 shadow-lg shadow-gray-200/40 flex flex-col justify-between min-h-[110px]">
            <div className="flex items-center gap-2 mb-3 text-gray-400">
              <TrendingUp size={14} strokeWidth={2.5} />
              <p className="text-[10px] font-bold uppercase tracking-wider text-gray-500">Meal Rate</p>
            </div>
            <h2 className="text-2xl font-bold text-[#052065] tracking-tight">৳ {currentMealRate.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</h2>
          </div>
        </div>

        <div className="px-1">
          <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
            <h3 className="text-sm font-bold text-[#052065] uppercase tracking-wider">
              {isToday ? "Today's Meals" : "Daily Schedule"}
            </h3>
            <div className="flex items-center gap-2 bg-gray-100/50 p-1 rounded-lg">
              <button onClick={() => changeDate(-1)} className="p-1 text-gray-400 hover:text-[#052065] transition-colors">
                <ChevronLeft size={16} strokeWidth={2} />
              </button>
              <span className="text-[11px] font-bold text-gray-700 min-w-[80px] text-center">
                {selectedDateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
              </span>
              <button onClick={() => changeDate(1)} className="p-1 text-gray-400 hover:text-[#052065] transition-colors">
                <ChevronRight size={16} strokeWidth={2} />
              </button>
            </div>
          </div>

          {isSelectedHoliday && (
            <div className="mb-4 p-3 bg-red-50 border border-red-100 rounded-xl flex items-center gap-3">
              <Calendar size={18} className="text-[#F33131]" />
              <p className="text-xs font-bold text-[#F33131] uppercase tracking-wider">
                {activeHoliday.name} - Mess Closed
              </p>
            </div>
          )}
          
          <div className="flex flex-col gap-3">
            {/* Breakfast */}
            <div className={`flex items-center justify-between p-4 rounded-xl border transition-all ${
                displayedMeals.breakfast > 0 
                ? 'border-[#0060E5]/30 bg-blue-50/50 shadow-sm' 
                : 'border-white/60 bg-white/60 backdrop-blur-sm'
              }`}>
              <div className="flex items-center gap-4">
                <div className={`p-2.5 rounded-full ${displayedMeals.breakfast > 0 ? 'bg-[#0060E5]/10 text-[#0060E5]' : 'bg-gray-50 text-gray-400'}`}>
                  <Coffee size={18} strokeWidth={2} />
                </div>
                <div className="flex flex-col">
                  <span className={`text-[11px] font-bold uppercase tracking-wide ${displayedMeals.breakfast > 0 ? 'text-[#052065]' : 'text-gray-400'}`}>Breakfast</span>
                  <span className="text-xs text-gray-500 font-medium mt-0.5">{isSelectedHoliday ? "Closed for Holiday" : currentMenu.breakfast}</span>
                </div>
              </div>
              <div className="flex flex-col items-end">
                {displayedMeals.breakfast > 0 && <span className="w-1.5 h-1.5 rounded-full bg-[#0060E5] mb-1 shadow-[0_0_6px_rgba(0,96,229,0.6)]"></span>}
                <span className={`text-sm font-bold ${displayedMeals.breakfast > 0 ? 'text-[#052065]' : 'text-gray-300'}`}>
                  {displayedMeals.breakfast > 0 ? `${displayedMeals.breakfast} ${displayedMeals.breakfast <= 1 ? 'Meal' : 'Meals'}` : 'Off'}
                </span>
              </div>
            </div>

            {/* Lunch */}
            <div className={`flex items-center justify-between p-4 rounded-xl border transition-all ${
                displayedMeals.lunch > 0 
                ? 'border-[#0060E5]/30 bg-blue-50/50 shadow-sm' 
                : 'border-white/60 bg-white/60 backdrop-blur-sm'
              }`}>
              <div className="flex items-center gap-4">
                <div className={`p-2.5 rounded-full ${displayedMeals.lunch > 0 ? 'bg-[#0060E5]/10 text-[#0060E5]' : 'bg-gray-50 text-gray-400'}`}>
                  <Utensils size={18} strokeWidth={2} />
                </div>
                <div className="flex flex-col">
                  <span className={`text-[11px] font-bold uppercase tracking-wide ${displayedMeals.lunch > 0 ? 'text-[#052065]' : 'text-gray-400'}`}>Lunch</span>
                  <span className="text-xs text-gray-500 font-medium mt-0.5">{isSelectedHoliday ? "Closed for Holiday" : currentMenu.lunch}</span>
                </div>
              </div>
              <div className="flex flex-col items-end">
                {displayedMeals.lunch > 0 && <span className="w-1.5 h-1.5 rounded-full bg-[#0060E5] mb-1 shadow-[0_0_6px_rgba(0,96,229,0.6)]"></span>}
                <span className={`text-sm font-bold ${displayedMeals.lunch > 0 ? 'text-[#052065]' : 'text-gray-300'}`}>
                  {displayedMeals.lunch > 0 ? `${displayedMeals.lunch} ${displayedMeals.lunch <= 1 ? 'Meal' : 'Meals'}` : 'Off'}
                </span>
              </div>
            </div>

            {/* Dinner */}
            <div className={`flex items-center justify-between p-4 rounded-xl border transition-all ${
                displayedMeals.dinner > 0 
                ? 'border-[#0060E5]/30 bg-blue-50/50 shadow-sm' 
                : 'border-white/60 bg-white/60 backdrop-blur-sm'
              }`}>
              <div className="flex items-center gap-4">
                <div className={`p-2.5 rounded-full ${displayedMeals.dinner > 0 ? 'bg-[#0060E5]/10 text-[#0060E5]' : 'bg-gray-50 text-gray-400'}`}>
                  <Moon size={18} strokeWidth={2} />
                </div>
                <div className="flex flex-col">
                  <span className={`text-[11px] font-bold uppercase tracking-wide ${displayedMeals.dinner > 0 ? 'text-[#052065]' : 'text-gray-400'}`}>Dinner</span>
                  <span className="text-xs text-gray-500 font-medium mt-0.5">{isSelectedHoliday ? "Closed for Holiday" : currentMenu.dinner}</span>
                </div>
              </div>
              <div className="flex flex-col items-end">
                {displayedMeals.dinner > 0 && <span className="w-1.5 h-1.5 rounded-full bg-[#0060E5] mb-1 shadow-[0_0_6px_rgba(0,96,229,0.6)]"></span>}
                <span className={`text-sm font-bold ${displayedMeals.dinner > 0 ? 'text-[#052065]' : 'text-gray-300'}`}>
                  {displayedMeals.dinner > 0 ? `${displayedMeals.dinner} ${displayedMeals.dinner <= 1 ? 'Meal' : 'Meals'}` : 'Off'}
                </span>
              </div>
            </div>
          </div>
        </div>

        <div className="mt-2 px-1">
          <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
            <h3 className="text-sm font-bold text-[#052065] uppercase tracking-wider">Recent Bazaar</h3>
            {expenses.length > 3 && (
              <button 
                onClick={() => setShowAllExpenses(!showAllExpenses)}
                className="text-gray-400 hover:text-[#0060E5] text-[10px] font-bold uppercase tracking-widest flex items-center transition-colors p-1"
              >
                {showAllExpenses ? 'View Less' : 'View All'} 
                <ChevronRight size={12} className={`ml-0.5 transition-transform ${showAllExpenses ? 'rotate-90' : ''}`} />
              </button>
            )}
          </div>
          
          <div className="flex flex-col gap-1">
            {(showAllExpenses ? expenses : expenses.slice(0, 3)).map((expense) => (
              <div key={expense.id} className="flex items-center justify-between py-3 border-b border-gray-50 last:border-0">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 rounded-full bg-[#0060E5]/5 border border-[#0060E5]/10 flex items-center justify-center text-[#0060E5]">
                    <ShoppingBag size={16} strokeWidth={1.5} />
                  </div>
                  <div>
                    <h4 
                      onClick={() => { setEditingExpense(expense); setModalType('editBazar'); }}
                      className="font-bold text-[#052065] text-sm cursor-pointer hover:text-[#0060E5] transition-colors"
                    >
                      {expense.name}
                    </h4>
                    <p className="text-[10px] text-gray-500 mt-0.5 font-medium">{expense.date} • <span className="text-[#0060E5]">{expense.memberName}</span></p>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className="font-bold text-[#052065] text-sm tracking-tight">- ৳{expense.amount}</span>
                  <button 
                    onClick={() => { setEditingExpense(expense); setModalType('editBazar'); }}
                    className="p-1.5 text-gray-300 hover:text-[#0060E5] bg-gray-50 hover:bg-blue-50 rounded-lg transition-colors"
                  >
                    <Edit3 size={14} strokeWidth={2.5} />
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  const renderExpensesTab = () => {
    let displayFinances = memberFinances;

    return (
      <div className="flex flex-col gap-6 pb-[100px] pt-10 px-4 sm:px-6 relative z-10">
        
        {/* Container explicitly sized/styled for html2canvas to capture correctly */}
        <div id="finance-summary-container" className="flex flex-col gap-6 bg-[#FAFAFA] p-2 -mx-2 rounded-2xl relative">
          <div className="flex justify-between items-end border-b border-gray-100 pb-4 px-1">
            <div>
              <h2 className="text-2xl font-bold text-[#052065] tracking-tight">Finances</h2>
              <p className="text-xs text-gray-500 font-medium">Monthly balance summary</p>
            </div>
            
            <div className="flex flex-col items-end gap-2">
              <button 
                onClick={handleSnap}
                data-html2canvas-ignore="true"
                disabled={isSnapping}
                className="flex items-center gap-1.5 bg-[#00B991]/10 text-[#00B991] px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-colors hover:bg-[#00B991]/20 disabled:opacity-50 active:scale-95"
              >
                <Camera size={14} strokeWidth={2.5}/> {isSnapping ? 'Snapping...' : 'Snap & Share'}
              </button>

              <div className="relative" data-html2canvas-ignore="true">
                <select
                  value={selectedFinanceMonth}
                  onChange={(e) => setSelectedFinanceMonth(e.target.value)}
                  className="appearance-none bg-white/80 backdrop-blur-sm border border-gray-200 text-[#052065] text-[10px] font-bold rounded-xl pl-3 pr-8 py-2 focus:outline-none focus:border-[#0060E5] shadow-sm transition-colors cursor-pointer uppercase tracking-wider"
                >
                  <option value="2026-03">March 2026</option>
                  <option value="2026-02">Feb 2026</option>
                  <option value="2026-01">Jan 2026</option>
                </select>
                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2.5 text-gray-400">
                  <ChevronDown size={14} strokeWidth={2} />
                </div>
              </div>
            </div>
          </div>

          <div className="flex flex-col gap-4">
            {displayFinances.map(member => {
              // Fresh calculation directly from the current expenses array!
              const memberCredit = getMemberCredit(member.id);
              const computedMealCost = selectedFinanceMonth === '2026-03' 
                ? (member.totalMeals * currentMealRate) 
                : 0; 

              const effectiveBazar = memberCredit + (member.settlementAdjustment || 0);
              const balance = effectiveBazar - computedMealCost;
              
              const isReturnable = balance > 1; 
              const isPayable = balance < -1;
              const absBalance = Math.abs(balance);
              const hasManualSettlement = (member.settlementAdjustment || 0) !== 0;

              return (
                <div key={member.id} className="bg-white p-5 rounded-2xl border border-gray-100 shadow-lg shadow-gray-200/40 flex flex-col gap-4 transition-all">
                  <div className="flex justify-between items-center pb-4 border-b border-gray-100">
                    <div className="flex items-center gap-3">
                      <div className="w-9 h-9 rounded-full bg-[#052065] text-white flex items-center justify-center font-bold text-sm shadow-md">
                        {member.name.charAt(0)}
                      </div>
                      <div>
                        <span className="font-bold text-[#052065] block text-sm">{member.name}</span>
                        <span className="text-[10px] text-gray-500 font-bold uppercase tracking-wide">{member.totalMeals || 0} meals</span>
                      </div>
                    </div>
                    <div className="text-right">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-0.5">Bazar / Deposit</span>
                      <span className="text-sm font-bold text-[#052065]">৳{memberCredit.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 1})}</span>
                    </div>
                  </div>
                  
                  <div className="flex justify-between items-end">
                    <div className="flex flex-col">
                      <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Meal Cost</span>
                      <span className="text-sm font-bold text-gray-700">৳{computedMealCost.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 1})}</span>
                    </div>

                    {isReturnable && (
                      <div className="flex flex-col items-end">
                        <span className="text-[10px] font-bold text-[#00B991] uppercase tracking-widest mb-1 flex items-center gap-1">
                          <span className="w-1.5 h-1.5 rounded-full bg-[#00B991]"></span> Returnable
                        </span>
                        <span className="text-lg font-bold text-[#008848] tracking-tight">৳{absBalance.toLocaleString(undefined, {maximumFractionDigits: 1})}</span>
                      </div>
                    )}

                    {isPayable && (
                      <div className="flex flex-col items-end">
                        <span className="text-[10px] font-bold text-[#F33131] uppercase tracking-widest mb-1 flex items-center gap-1">
                          <span className="w-1.5 h-1.5 rounded-full bg-[#F33131]"></span> Payable
                        </span>
                        <span className="text-lg font-bold text-[#F33131] tracking-tight">৳{absBalance.toLocaleString(undefined, {maximumFractionDigits: 1})}</span>
                      </div>
                    )}

                    {(!isReturnable && !isPayable) && (
                      <div className="flex flex-col items-end">
                        <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Status</span>
                        <span className="text-sm font-bold text-[#00B991] flex items-center gap-1">
                          <CheckCircle2 size={14} strokeWidth={2.5} /> Settled
                        </span>
                      </div>
                    )}
                  </div>

                  {selectedFinanceMonth === '2026-03' && !hasManualSettlement && (isReturnable || isPayable) && (
                    <button 
                      data-html2canvas-ignore="true"
                      onClick={() => handleToggleSettle(member.id, true)}
                      className="w-full mt-1 py-2.5 rounded-xl border border-dashed border-gray-300 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:border-[#0060E5] hover:text-[#0060E5] hover:bg-blue-50/50 transition-all active:scale-[0.98]"
                    >
                      Mark as Settled
                    </button>
                  )}

                  {selectedFinanceMonth === '2026-03' && hasManualSettlement && (
                    <button 
                      data-html2canvas-ignore="true"
                      onClick={() => handleToggleSettle(member.id, false)}
                      className="w-full mt-1 py-2.5 rounded-xl border border-dashed border-gray-300 text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:border-[#F33131] hover:text-[#F33131] hover:bg-red-50/50 transition-all active:scale-[0.98]"
                    >
                      Undo Settle
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  const renderMealsTab = () => { 
    const currentSchedule = memberSchedules.find(s => s.memberId === selectedScheduleMember) || memberSchedules[0];

    const cycleSchedule = (day, mealType) => {
      setMemberSchedules(prev => prev.map(s => {
        if (s.memberId !== selectedScheduleMember) return s;
        const current = s.schedule[day][mealType];
        let next = 0;
        if (current === 0) next = 0.5;
        else if (current === 0.5) next = 1;
        else if (current === 1) next = 2;
        else next = 0;
        
        return {
          ...s,
          schedule: {
            ...s.schedule,
            [day]: {
              ...s.schedule[day],
              [mealType]: next
            }
          }
        };
      }));
    };

    return (
      <div className="flex flex-col gap-6 pb-[100px] pt-10 px-4 sm:px-6 relative z-10">
        <div className="border-b border-gray-100 pb-4 px-1">
          <h2 className="text-2xl font-bold text-[#052065] tracking-tight">Schedules</h2>
          <p className="text-xs text-gray-500 font-medium">Default weekly meal counts</p>
        </div>

        <div className="px-1">
          <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block px-1">Select Member</label>
          <div className="relative">
            <select
              value={selectedScheduleMember}
              onChange={(e) => setSelectedScheduleMember(parseInt(e.target.value))}
              className="w-full appearance-none border border-white/60 rounded-xl p-4 text-sm font-bold text-[#052065] bg-white/80 backdrop-blur-md shadow-sm focus:outline-none focus:border-[#0060E5] transition-colors"
            >
              {memberFinances.map(m => (
                <option key={m.id} value={m.id}>
                  {m.name}
                </option>
              ))}
            </select>
            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
              <ChevronRight size={16} className="rotate-90" />
            </div>
          </div>
        </div>

        <div className="bg-white/80 backdrop-blur-md rounded-xl border border-white/60 overflow-hidden shadow-lg shadow-gray-200/40">
          <div className="flex bg-gray-50/80 p-3 border-b border-gray-100">
            <div className="w-12 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Day</div>
            <div className="flex-1 flex justify-between px-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
              <span>Brk</span>
              <span>Lun</span>
              <span>Din</span>
            </div>
          </div>

          <div className="flex flex-col">
            {daysOfWeek.map((day, idx) => (
              <div key={day} className={`flex items-center p-3 ${idx !== daysOfWeek.length - 1 ? 'border-b border-gray-50' : ''}`}>
                <div className="w-12 font-bold text-[#052065] text-[11px] uppercase tracking-wide">{day}</div>
                <div className="flex-1 flex justify-between gap-2 px-1">
                  <button 
                    onClick={() => cycleSchedule(day, 'breakfast')} 
                    className={`flex-1 py-2 rounded-lg text-[11px] font-bold transition-colors ${currentSchedule?.schedule[day].breakfast > 0 ? 'bg-[#0060E5] text-white shadow-md' : 'bg-gray-100/50 text-gray-400 hover:bg-gray-200'}`}
                  >
                    {currentSchedule?.schedule[day].breakfast > 0 ? currentSchedule.schedule[day].breakfast : '-'}
                  </button>
                  <button 
                    onClick={() => cycleSchedule(day, 'lunch')} 
                    className={`flex-1 py-2 rounded-lg text-[11px] font-bold transition-colors ${currentSchedule?.schedule[day].lunch > 0 ? 'bg-[#0060E5] text-white shadow-md' : 'bg-gray-100/50 text-gray-400 hover:bg-gray-200'}`}
                  >
                    {currentSchedule?.schedule[day].lunch > 0 ? currentSchedule.schedule[day].lunch : '-'}
                  </button>
                  <button 
                    onClick={() => cycleSchedule(day, 'dinner')} 
                    className={`flex-1 py-2 rounded-lg text-[11px] font-bold transition-colors ${currentSchedule?.schedule[day].dinner > 0 ? 'bg-[#0060E5] text-white shadow-md' : 'bg-gray-100/50 text-gray-400 hover:bg-gray-200'}`}
                  >
                    {currentSchedule?.schedule[day].dinner > 0 ? currentSchedule.schedule[day].dinner : '-'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="mt-2 px-1">
          <div className="flex justify-between items-center mb-3">
            <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Specific Exceptions</h3>
            <button 
              onClick={() => setModalType('offDay')}
              className="text-[#0060E5] hover:text-[#052065] transition-colors p-1"
            >
              <Plus size={20} strokeWidth={3} />
            </button>
          </div>

          <div className="flex flex-col gap-2">
            {mealExceptions.filter(o => o.memberId === selectedScheduleMember).length === 0 ? (
              <p className="text-[10px] font-bold uppercase tracking-widest text-gray-400 p-6 bg-gray-50/50 rounded-xl border border-dashed border-gray-200 text-center">No exceptions added</p>
            ) : (
              mealExceptions.filter(o => o.memberId === selectedScheduleMember).map(exc => {
                let title = "";
                if (exc.breakfast === 0 && exc.lunch === 0 && exc.dinner === 0) {
                  title = "All Meals Off";
                } else {
                  const parts = [];
                  if (exc.breakfast !== undefined) parts.push(`B:${exc.breakfast}`);
                  if (exc.lunch !== undefined) parts.push(`L:${exc.lunch}`);
                  if (exc.dinner !== undefined) parts.push(`D:${exc.dinner}`);
                  title = parts.join(', ');
                }
                
                return (
                  <div key={exc.id} className="bg-white/80 backdrop-blur-sm p-3.5 rounded-xl border border-white shadow-sm flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-[#052065] text-xs">{title}</h4>
                      <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wide mt-0.5">
                        {new Date(exc.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
                      </p>
                    </div>
                    <button 
                      onClick={() => setMealExceptions(prev => prev.filter(item => item.id !== exc.id))}
                      className="text-gray-400 hover:text-[#F33131] transition-colors p-1"
                    >
                      <X size={16} />
                    </button>
                  </div>
                );
              })
            )}
          </div>
        </div>

        {/* Bazar Schedules Section */}
        <div className="mt-4 pt-4 border-t border-gray-100 px-1">
          <div className="flex justify-between items-center mb-3">
            <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Bazar Schedule</h3>
            <button 
              onClick={() => setModalType('bazarSchedule')}
              className="text-[#0060E5] hover:text-[#052065] transition-colors p-1"
            >
              <Plus size={20} strokeWidth={3} />
            </button>
          </div>

          <div className="flex flex-col gap-2">
            {bazarSchedules.length === 0 ? (
              <p className="text-[10px] font-bold uppercase tracking-widest text-gray-400 p-6 bg-gray-50/50 rounded-xl border border-dashed border-gray-200 text-center">No bazar scheduled</p>
            ) : (
              bazarSchedules.map((schedule) => {
                const member = memberFinances.find(m => m.id === schedule.memberId);
                const startStr = new Date(schedule.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const endStr = new Date(schedule.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                return (
                  <div key={schedule.id} className="bg-white/80 backdrop-blur-sm p-3.5 rounded-xl border border-white shadow-sm flex justify-between items-center">
                    <div>
                      <h4 className="font-bold text-[#052065] text-xs">{member?.name || 'Unknown'}</h4>
                      <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wide mt-0.5">
                        {startStr} - {endStr}
                      </p>
                    </div>
                    <button 
                      onClick={() => handleDeleteBazarSchedule(schedule.id)}
                      className="text-gray-400 hover:text-[#F33131] transition-colors p-1"
                    >
                      <X size={16} />
                    </button>
                  </div>
                );
              })
            )}
          </div>
        </div>

        <div className="mt-4 pt-4 border-t border-gray-100 px-1">
          <div className="flex justify-between items-center mb-3">
            <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Mess Holidays</h3>
            <button 
              onClick={() => setModalType('holiday')}
              className="text-[#0060E5] hover:text-[#052065] transition-colors p-1"
            >
              <Plus size={20} strokeWidth={3} />
            </button>
          </div>

          <div className="flex flex-col gap-2">
            {holidays.length === 0 ? (
              <p className="text-[10px] font-bold uppercase tracking-widest text-gray-400 p-6 bg-gray-50/50 rounded-xl border border-dashed border-gray-200 text-center">No upcoming holidays</p>
            ) : (
              holidays.map(h => (
                <div key={h.id} className="bg-white/80 backdrop-blur-sm p-3.5 rounded-xl border border-white shadow-sm flex justify-between items-center">
                  <div>
                    <h4 className="font-bold text-[#052065] text-xs">{h.name}</h4>
                    <p className="text-[10px] text-[#F33131] mt-0.5 font-bold uppercase tracking-wider flex items-center gap-1">
                       <span className="w-1.5 h-1.5 rounded-full bg-[#F33131] shadow-[0_0_6px_rgba(243,49,49,0.6)]"></span> Closed on {new Date(h.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                    </p>
                  </div>
                  <button 
                    onClick={() => setHolidays(prev => prev.filter(item => item.id !== h.id))}
                    className="text-gray-400 hover:text-[#F33131] transition-colors p-1"
                  >
                    <X size={16} />
                  </button>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    );
  };

  const renderProfileTab = () => (
    <div className="flex flex-col gap-6 pb-[100px] pt-10 px-4 sm:px-6 relative z-10">
      <div className="border-b border-gray-100 pb-4 px-1 flex justify-between items-end">
        <div>
          <h2 className="text-2xl font-bold text-[#052065] tracking-tight">Members</h2>
          <p className="text-xs text-gray-500 font-medium">Manage stats & add new</p>
        </div>
        <button 
          onClick={() => setModalType('addMember')}
          className="flex items-center gap-1.5 bg-[#0060E5]/10 text-[#0060E5] px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-colors hover:bg-[#0060E5]/20"
        >
          <UserPlus size={14} strokeWidth={2.5}/> Add
        </button>
      </div>

      <div className="flex flex-col gap-3 px-1">
        {memberFinances.map((member) => (
          <div key={member.id} className="bg-white/80 backdrop-blur-md p-4 rounded-xl border border-white shadow-sm flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-[#052065] font-bold text-sm">
                {member.name.charAt(0)}
              </div>
              <div>
                <h4 className="font-bold text-[#052065] text-sm">{member.name}</h4>
                <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">
                  {member.totalMeals} Meals • ৳{getMemberCredit(member.id)} Dep
                </p>
              </div>
            </div>
            <button 
              onClick={() => { setEditingMember(member); setModalType('editMember'); }}
              className="p-2 text-gray-400 hover:text-[#0060E5] bg-gray-50 rounded-lg transition-colors"
            >
              <Edit3 size={16} strokeWidth={2} />
            </button>
          </div>
        ))}
      </div>

      <button 
        onClick={() => setIsLoggedIn(false)}
        className="mt-4 mx-1 flex items-center justify-center gap-2 bg-red-50 text-[#F33131] py-4 rounded-xl text-xs font-bold uppercase tracking-widest transition-colors hover:bg-red-100 active:scale-[0.98]"
      >
        <LogOut size={16} strokeWidth={2.5} /> Log Out
      </button>
    </div>
  );

  const renderEntryModal = () => {
    if (!modalType) return null;

    return (
      <div className="absolute inset-0 bg-gray-900/40 backdrop-blur-sm z-[100] flex items-end sm:items-center justify-center transition-opacity">
        <div className="bg-white w-full max-h-[90%] overflow-y-auto sm:w-[90%] rounded-t-[2rem] sm:rounded-2xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
          <div className="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
            <h2 className="text-lg font-bold text-[#052065] tracking-tight uppercase tracking-widest text-sm">
              {modalType === 'bazar' ? 'Add Bazar Exp' : 
               modalType === 'editBazar' ? 'Edit Bazar Exp' : 
               modalType === 'deposit' ? 'Add Cash Deposit' : 
               modalType === 'meal' ? 'Extra / Guest Meal' : 
               modalType === 'menu' ? 'Set Daily Menu' : 
               modalType === 'bazarSchedule' ? 'Schedule Bazar' : 
               modalType === 'addMember' ? 'Add New Member' : 
               modalType === 'editMember' ? 'Edit Member Stats' : 
               modalType === 'offDay' ? 'Add Exception' : 'Add Holiday'}
            </h2>
            <button onClick={() => { setModalType(null); setEditingMember(null); setEditingExpense(null); }} className="text-gray-400 hover:text-gray-800 transition-colors bg-gray-50 rounded-full p-1.5">
              <X size={20} />
            </button>
          </div>

          {/* ADD BAZAR FORM */}
          {modalType === 'bazar' && (
            <form onSubmit={handleBazarSubmit} className="flex flex-col gap-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Shopper</label>
                  <select name="memberId" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                    <option value="">Select...</option>
                    {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Date</label>
                  <input type="date" name="bazarDate" defaultValue={getFormattedDateStr(new Date())} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Items</label>
                  <input type="text" name="itemName" required placeholder="e.g. Rice & Veg" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Amount Spent (৳)</label>
                  <input type="number" name="amount" required min="1" placeholder="0" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Save Expense</button>
            </form>
          )}

          {/* EDIT BAZAR FORM */}
          {modalType === 'editBazar' && editingExpense && (
            <form onSubmit={handleEditBazarSubmit} className="flex flex-col gap-4">
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Shopper</label>
                  <select name="memberId" defaultValue={editingExpense.memberId} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                    <option value="">Select...</option>
                    {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Date</label>
                  <input type="date" name="bazarDate" defaultValue={editingExpense.rawDate} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Items</label>
                  <input type="text" name="itemName" defaultValue={editingExpense.name} required placeholder="e.g. Rice & Veg" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Amount Spent (৳)</label>
                  <input type="number" name="amount" defaultValue={editingExpense.amount} required min="1" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>

              <div className="flex gap-3 mt-2">
                <button 
                  type="button" 
                  onClick={() => handleDeleteBazar(editingExpense.id)}
                  className="flex-1 bg-red-50 text-[#F33131] text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 hover:bg-red-100 transition-colors shadow-sm active:scale-[0.98]"
                >
                  Delete
                </button>
                <button 
                  type="submit" 
                  className="flex-[2] bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]"
                >
                  Save Changes
                </button>
              </div>
            </form>
          )}

          {/* ADD CASH DEPOSIT FORM */}
          {modalType === 'deposit' && (
            <form onSubmit={handleDepositSubmit} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Member Depositing Cash</label>
                <select name="memberId" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                  <option value="">Select member...</option>
                  {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Cash Amount (৳)</label>
                <input type="number" name="amount" required min="1" placeholder="e.g. 2000" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <button type="submit" className="w-full bg-[#00B991] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#008848] transition-colors shadow-lg shadow-[#00B991]/20 active:scale-[0.98]">Save Deposit</button>
            </form>
          )}

          {/* ADD/GUEST MEAL FORM */}
          {modalType === 'meal' && (
            <form onSubmit={handleMealSubmit} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Charge To Member</label>
                <select name="memberId" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                  <option value="">Select a member...</option>
                  {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">No. of Extra Meals</label>
                <input type="number" name="mealCount" step="0.5" required min="0.5" placeholder="e.g. 1" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Add Extra Meal</button>
            </form>
          )}

          {/* SET MENU FORM */}
          {modalType === 'menu' && (
            <form onSubmit={handleMenuSubmit} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Menu Date</label>
                <input type="date" name="menuDate" defaultValue={selectedDateStr} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <div className="flex flex-col gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Breakfast</label>
                  <input type="text" name="menuBreakfast" defaultValue={dailyMenus[selectedDateStr]?.breakfast || ""} placeholder="e.g. Alur Bhorta & Dal" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Lunch</label>
                  <input type="text" name="menuLunch" defaultValue={dailyMenus[selectedDateStr]?.lunch || ""} placeholder="e.g. Murgir Kala Buna" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Dinner</label>
                  <input type="text" name="menuDinner" defaultValue={dailyMenus[selectedDateStr]?.dinner || ""} placeholder="e.g. Lal Shak, Lau Baji, Dal" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Update Menus</button>
            </form>
          )}

          {/* BAZAR SCHEDULE FORM */}
          {modalType === 'bazarSchedule' && (
            <form onSubmit={handleBazarScheduleSubmit} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Assign Member</label>
                <select name="memberId" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                  <option value="">Select a member...</option>
                  {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Start Date</label>
                  <input type="date" name="startDate" defaultValue={selectedDateStr} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">End Date</label>
                  <input type="date" name="endDate" defaultValue={selectedDateStr} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Save Schedule</button>
            </form>
          )}

          {/* ADD MEMBER FORM */}
          {modalType === 'addMember' && (
            <form onSubmit={handleAddMember} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Full Name</label>
                <input type="text" name="name" required placeholder="e.g. Asif Mahmud" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Create Member</button>
            </form>
          )}

          {/* EDIT MEMBER STATS FORM */}
          {modalType === 'editMember' && editingMember && (
            <form onSubmit={handleEditMember} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Full Name</label>
                <input type="text" name="name" defaultValue={editingMember.name} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Total Deposit (৳)</label>
                  <input type="number" name="bazarAmount" defaultValue={getMemberCredit(editingMember.id)} step="0.01" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Total Meals</label>
                  <input type="number" name="totalMeals" defaultValue={editingMember.totalMeals} step="0.5" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
                </div>
              </div>
              <p className="text-[10px] text-gray-400 font-medium leading-relaxed">Warning: Editing these numbers manually will instantly recalculate the mess meal rate and balances.</p>
              <div className="flex gap-3 mt-1">
                <button 
                  type="button" 
                  onClick={() => handleDeleteMember(editingMember.id)}
                  className="flex-1 bg-red-50 text-[#F33131] text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 hover:bg-red-100 transition-colors shadow-sm active:scale-[0.98]"
                >
                  Delete
                </button>
                <button 
                  type="submit" 
                  className="flex-[2] bg-[#052065] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 hover:bg-[#000] transition-colors shadow-lg active:scale-[0.98]"
                >
                  Save Overrides
                </button>
              </div>
            </form>
          )}

          {/* EXCEPTIONS & HOLIDAYS */}
          {modalType === 'offDay' && (
            <form onSubmit={handleOffDaySubmit} className="flex flex-col gap-4">
               <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Member</label>
                <select name="memberId" defaultValue={selectedScheduleMember} required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                  {memberFinances.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Date</label>
                <input type="date" name="offDate" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Type</label>
                <select name="mealType" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors">
                  <option value="all">Full Day Off</option>
                  <option value="breakfast">Breakfast Off</option>
                  <option value="lunch">Lunch Off</option>
                  <option value="dinner">Dinner Off</option>
                </select>
              </div>
              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Add Exception</button>
            </form>
          )}

          {modalType === 'holiday' && (
            <form onSubmit={handleHolidaySubmit} className="flex flex-col gap-4">
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Holiday Reason</label>
                <input type="text" name="holidayName" required placeholder="e.g. Eid Vacation" className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
              <div>
                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5 block">Holiday Date</label>
                <input type="date" name="holidayDate" required className="w-full border border-gray-100 rounded-xl p-3.5 text-xs font-bold text-[#052065] bg-gray-50 focus:outline-none focus:border-[#0060E5] focus:bg-white transition-colors" />
              </div>
