              <button type="submit" className="w-full bg-[#0060E5] text-white text-xs font-bold uppercase tracking-[0.15em] rounded-xl py-2.5 mt-2 hover:bg-[#052065] transition-colors shadow-lg shadow-[#0060E5]/20 active:scale-[0.98]">Save Holiday</button>
            </form>
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-[#FAFAFA] font-sans text-gray-800">
      <div className="w-full max-w-full sm:max-w-[400px] mx-auto h-[100dvh] sm:h-[800px] sm:my-4 bg-[#FAFAFA] sm:rounded-[2.5rem] sm:shadow-2xl relative overflow-hidden flex flex-col sm:border sm:border-gray-200 transition-all">
        
        {/* Ambient Top Glow Blobs */}
        <div className="absolute top-0 inset-x-0 h-48 pointer-events-none overflow-hidden z-0">
          <div className="absolute -top-20 -left-20 w-56 h-56 bg-[#0060E5]/10 rounded-full blur-[50px]"></div>
          <div className="absolute -top-16 -right-16 w-56 h-56 bg-[#FC0075]/05 rounded-full blur-[50px]"></div>
        </div>

        {/* Scrollable Content Area */}
        <div className="flex-1 overflow-y-auto overflow-x-hidden [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
          {activeTab === 'home' && renderHomeTab()}
          {activeTab === 'meals' && renderMealsTab()}
          {activeTab === 'expenses' && renderExpensesTab()}
          {activeTab === 'profile' && renderProfileTab()}
        </div>

        {/* Floating Action Button */}
        {activeTab === 'home' && (
          <>
            {isFabOpen && (
              <div 
                className="absolute inset-0 bg-gray-900/10 backdrop-blur-sm z-40 transition-opacity"
                onClick={() => setIsFabOpen(false)}
              ></div>
            )}

            <div className="absolute bottom-[90px] right-6 z-50 flex flex-col items-end gap-4 pointer-events-none">
              <div className={`flex flex-col items-end gap-3 transition-all duration-300 origin-bottom ${isFabOpen ? 'scale-100 opacity-100 pointer-events-auto' : 'scale-90 opacity-0 pointer-events-none'}`}>
                <button 
                  onClick={() => { setModalType('bazar'); setIsFabOpen(false); }}
                  className="flex items-center gap-3 bg-white pr-4 pl-3 py-3 rounded-full shadow-xl border border-gray-100 text-[#052065] font-bold hover:bg-gray-50 active:scale-95 transition-all"
                >
                  <span className="text-[11px] uppercase tracking-widest">Bazar Exp</span>
                  <ShoppingCart size={18} className="text-[#0060E5]" />
                </button>
                <button 
                  onClick={() => { setModalType('deposit'); setIsFabOpen(false); }}
                  className="flex items-center gap-3 bg-white pr-4 pl-3 py-3 rounded-full shadow-xl border border-gray-100 text-[#052065] font-bold hover:bg-gray-50 active:scale-95 transition-all"
                >
                  <span className="text-[11px] uppercase tracking-widest">Cash Deposit</span>
                  <Banknote size={18} className="text-[#00B991]" />
                </button>
                <button 
                  onClick={() => { setModalType('menu'); setIsFabOpen(false); }}
                  className="flex items-center gap-3 bg-white pr-4 pl-3 py-3 rounded-full shadow-xl border border-gray-100 text-[#052065] font-bold hover:bg-gray-50 active:scale-95 transition-all"
                >
                  <span className="text-[11px] uppercase tracking-widest">Set Menu</span>
                  <Coffee size={18} className="text-[#0060E5]" />
                </button>
                <button 
                  onClick={() => { setModalType('meal'); setIsFabOpen(false); }}
                  className="flex items-center gap-3 bg-white pr-4 pl-3 py-3 rounded-full shadow-xl border border-gray-100 text-[#052065] font-bold hover:bg-gray-50 active:scale-95 transition-all"
                >
                  <span className="text-[11px] uppercase tracking-widest">Extra Meal</span>
                  <CheckCircle2 size={18} className="text-[#0060E5]" />
                </button>
              </div>

              <button 
                onClick={() => setIsFabOpen(!isFabOpen)}
                className={`w-14 h-14 rounded-full flex items-center justify-center shadow-2xl transition-all duration-300 active:scale-90 pointer-events-auto ${isFabOpen ? 'rotate-45 bg-white text-[#052065] shadow-lg border border-gray-100' : 'bg-[#0060E5] text-white shadow-[#0060E5]/40'}`}
              >
                <Plus size={28} strokeWidth={3} />
              </button>
            </div>
          </>
        )}

        {/* Floating Bottom Nav - Centered perfectly using flex fixed height */}
        <div className="absolute bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 h-[72px] z-[60] shadow-[0_-8px_40px_rgba(0,0,0,0.05)]">
          <div className="flex items-center h-full w-full">
            <button onClick={() => { setActiveTab('home'); setIsFabOpen(false); }} className="flex flex-col items-center justify-center gap-1 flex-1 h-full group">
              <Home size={22} strokeWidth={activeTab === 'home' ? 2 : 1.5} className={`transition-colors ${activeTab === 'home' ? 'text-[#0060E5]' : 'text-gray-400 group-hover:text-gray-600'}`} />
              <span className={`text-[10px] font-bold tracking-widest uppercase transition-colors ${activeTab === 'home' ? 'text-[#0060E5]' : 'text-gray-400'}`}>Home</span>
            </button>
            
            <button onClick={() => { setActiveTab('meals'); setIsFabOpen(false); }} className="flex flex-col items-center justify-center gap-1 flex-1 h-full group">
              <CalendarDays size={22} strokeWidth={activeTab === 'meals' ? 2 : 1.5} className={`transition-colors ${activeTab === 'meals' ? 'text-[#0060E5]' : 'text-gray-400 group-hover:text-gray-600'}`} />
              <span className={`text-[10px] font-bold tracking-widest uppercase transition-colors ${activeTab === 'meals' ? 'text-[#0060E5]' : 'text-gray-400'}`}>Meals</span>
            </button>
            
            <button onClick={() => { setActiveTab('expenses'); setIsFabOpen(false); }} className="flex flex-col items-center justify-center gap-1 flex-1 h-full group">
              <Wallet size={22} strokeWidth={activeTab === 'expenses' ? 2 : 1.5} className={`transition-colors ${activeTab === 'expenses' ? 'text-[#0060E5]' : 'text-gray-400 group-hover:text-gray-600'}`} />
              <span className={`text-[10px] font-bold tracking-widest uppercase transition-colors ${activeTab === 'expenses' ? 'text-[#0060E5]' : 'text-gray-400'}`}>Finance</span>
            </button>
            
            <button onClick={() => { setActiveTab('profile'); setIsFabOpen(false); }} className="flex flex-col items-center justify-center gap-1 flex-1 h-full group">
              <User size={22} strokeWidth={activeTab === 'profile' ? 2 : 1.5} className={`transition-colors ${activeTab === 'profile' ? 'text-[#0060E5]' : 'text-gray-400 group-hover:text-gray-600'}`} />
              <span className={`text-[10px] font-bold tracking-widest uppercase transition-colors ${activeTab === 'profile' ? 'text-[#0060E5]' : 'text-gray-400'}`}>Profile</span>
            </button>
          </div>
        </div>

        {renderEntryModal()}
      </div>
    </div>
  );
}
        // --- YOUR CODE ENDS HERE ---

        // Render the component to the DOM
        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
